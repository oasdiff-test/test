name: oasdiff
on:
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
  pull-requests: write
jobs:
  breaking-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: git fetch --depth=1 origin ${{ github.base_ref }}
      # NOTE: deliberately does NOT pass github-token, to verify the action.yml
      # default of ${{ github.token }} resolves and posts the PR comment.
      - uses: oasdiff/oasdiff-action/breaking@default-github-token
        with:
          base: 'origin/${{ github.base_ref }}:simple.yaml'
          revision: 'HEAD:simple.yaml'
          fail-on: WARN
